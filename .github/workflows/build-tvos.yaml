name: Build wiliwili tvOS

# 在 GitHub macOS runner 上：clone wiliwili → 应用补丁 → 取 MPVKit →
# cmake → xcodebuild →（simulator）模拟器冒烟。
# 免签名、免证书。每个可失败步骤都有 if: always() 的日志/产物兜底上传。
#
# 目标（workflow_dispatch input target）：
#   simulator（默认，push 触发亦走此路径）：-DPLATFORM=SIMULATORARM64_TVOS，
#     取 MPVKit 的 tvos-simulator 切片（SupportedPlatform==tvos 且
#     SupportedPlatformVariant==simulator），跑 simctl 冒烟，
#     artifact=wiliwili-tvos-simulator-app。
#   device（真机）：-DPLATFORM=TVOS（arm64-apple-tvos，appletvos SDK；见
#     borealis library/cmake/ios.toolchain.cmake:369-376），取 MPVKit 的
#     tvos 真机切片（SupportedPlatform==tvos 且无 SupportedPlatformVariant 键），
#     跳过模拟器冒烟（真机产物无法在 runner 上 boot），
#     artifact=wiliwili-tvos-device-app。真机 .app 未签名，需用
#     scripts/deploy-tvos-device.sh 在本地签名后经 devicectl 安装。
#
# 本 workflow 存放于「CI 仓库」（由 scripts/assemble-ci-repo.sh 装配），
# 该仓库根目录含 patches/0002-wiliwili-tvos.patch。wiliwili 源码由 CI 现场 clone。

on:
  push:
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target: simulator (default) or device (Apple TV real hardware)'
        required: false
        default: 'simulator'
        type: choice
        options:
          - simulator
          - device
      mpvkit_tag:
        description: 'MPVKit release tag'
        required: false
        default: '0.41.0'
      run_smoke:
        description: 'Run simulator smoke test (1) or compile-only (0). Ignored for device target.'
        required: false
        default: '1'

permissions:
  contents: write  # 允许失败时把错误摘要提交回仓库，供无浏览器环境诊断

jobs:
  build-tvos:
    # macos-15 为 Apple Silicon(arm64) runner，匹配 SIMULATORARM64_TVOS/TVOS 与
    # plist 的 UIRequiredDeviceCapabilities=arm64。
    runs-on: macos-15

    env:
      # target 为空（push 触发）→ simulator，保证 push 回归行为不变。
      TARGET: ${{ github.event.inputs.target || 'simulator' }}
      MPVKIT_TAG: ${{ github.event.inputs.mpvkit_tag || '0.41.0' }}
      RUN_SMOKE: ${{ github.event.inputs.run_smoke || '1' }}
      WILIWILI_REF: yoga
      WILIWILI_URL: https://github.com/xfangfang/wiliwili.git
      DEPLOYMENT_TARGET: '14.0'
      BUILD_CONFIG: Release
      DEPS_DIR: ${{ github.workspace }}/deps
      MPVKIT_DIR: ${{ github.workspace }}/mpvkit
      LOG_DIR: ${{ github.workspace }}/logs
      SRC_DIR: ${{ github.workspace }}/wiliwili

    steps:
      # -------------------------------------------------------------------
      - name: Checkout CI repo (patches live here)
        uses: actions/checkout@v4

      - name: Prepare dirs & tools
        run: |
          set -euo pipefail
          mkdir -p "${LOG_DIR}" "${DEPS_DIR}/lib/pkgconfig" "${DEPS_DIR}/include" "${MPVKIT_DIR}"
          brew list ninja >/dev/null 2>&1 || brew install ninja
          brew list pkg-config >/dev/null 2>&1 || brew install pkg-config
          echo "=== toolchain ==="        | tee "${LOG_DIR}/00-env.log"
          cmake --version                 | tee -a "${LOG_DIR}/00-env.log"
          xcodebuild -version             | tee -a "${LOG_DIR}/00-env.log"
          xcodebuild -showsdks | grep -i appletv | tee -a "${LOG_DIR}/00-env.log" || true

      # -------------------------------------------------------------------
      # WP9：程序化生成 App Icon & Top Shelf 的 Brand Assets（Assets.xcassets）。
      # 脚本来自本 CI 仓库 checkout（scripts/generate-brand-assets.py），logo 源
      # assets/logo-source.png 可缺失（脚本用占位猫脸 fallback 并 WARN）。
      # 非致命：生成失败仅告警，后续 actool 步骤会自动跳过，主构建不受影响。
      - name: Generate tvOS brand assets (App Icon & Top Shelf)
        run: |
          set -uo pipefail
          python3 -m pip install --upgrade pip >/dev/null 2>&1 || true
          python3 -m pip install pillow --break-system-packages 2>&1 \
            | tee "${LOG_DIR}/10-brand-pip.log" \
            || python3 -m pip install --user pillow 2>&1 \
                 | tee -a "${LOG_DIR}/10-brand-pip.log" || true
          if python3 "${GITHUB_WORKSPACE}/scripts/generate-brand-assets.py" \
               --source "${GITHUB_WORKSPACE}/assets/logo-source.png" \
               --out "${GITHUB_WORKSPACE}/assets/generated" \
               2>&1 | tee "${LOG_DIR}/10-brand-assets.log"; then
            echo "brand assets generated" | tee -a "${LOG_DIR}/10-brand-assets.log"
          else
            echo "WARN: brand asset generation failed; continuing without custom icon" \
              | tee -a "${LOG_DIR}/10-brand-assets.log"
          fi

      # -------------------------------------------------------------------
      - name: Clone wiliwili (yoga, recursive)
        run: |
          set -euo pipefail
          git clone --branch "${WILIWILI_REF}" --recursive "${WILIWILI_URL}" "${SRC_DIR}" \
            2>&1 | tee "${LOG_DIR}/01-clone.log"
          git -C "${SRC_DIR}" submodule update --init --recursive \
            2>&1 | tee "${LOG_DIR}/02-submodule.log"

      - name: Apply tvOS patch
        run: |
          set -euo pipefail
          PATCH="${GITHUB_WORKSPACE}/patches/0002-wiliwili-tvos.patch"
          test -f "${PATCH}" || { echo "patch not found: ${PATCH}"; exit 1; }
          if git -C "${SRC_DIR}" apply --reverse --check "${PATCH}" >/dev/null 2>&1; then
            echo "patch already applied" | tee "${LOG_DIR}/03-patch.log"
          else
            git -C "${SRC_DIR}" apply --check "${PATCH}" 2>&1 | tee "${LOG_DIR}/03-patch.log"
            git -C "${SRC_DIR}" apply "${PATCH}"
            echo "patch applied" | tee -a "${LOG_DIR}/03-patch.log"
          fi

      - name: Apply tvOS input patches (WP5 / 0003 wiliwili, 0004 borealis)
        run: |
          set -euo pipefail
          # 0003 叠加在 0002 之上，作用于 wiliwili 源码树
          P3="${GITHUB_WORKSPACE}/patches/0003-wiliwili-tvos-input.patch"
          test -f "${P3}" || { echo "patch not found: ${P3}"; exit 1; }
          if git -C "${SRC_DIR}" apply --reverse --check "${P3}" >/dev/null 2>&1; then
            echo "0003 already applied" | tee "${LOG_DIR}/03b-patch-input.log"
          else
            git -C "${SRC_DIR}" apply --check "${P3}" 2>&1 | tee "${LOG_DIR}/03b-patch-input.log"
            git -C "${SRC_DIR}" apply "${P3}"
            echo "0003 applied" | tee -a "${LOG_DIR}/03b-patch-input.log"
          fi
          # 0004 作用于 borealis 子模块 (SDL 平台层：tvOS Siri Remote 输入 hint)
          P4="${GITHUB_WORKSPACE}/patches/0004-borealis-tvos-input.patch"
          test -f "${P4}" || { echo "patch not found: ${P4}"; exit 1; }
          if git -C "${SRC_DIR}/library/borealis" apply --reverse --check "${P4}" >/dev/null 2>&1; then
            echo "0004 already applied" | tee -a "${LOG_DIR}/03b-patch-input.log"
          else
            git -C "${SRC_DIR}/library/borealis" apply --check "${P4}" 2>&1 | tee -a "${LOG_DIR}/03b-patch-input.log"
            git -C "${SRC_DIR}/library/borealis" apply "${P4}"
            echo "0004 applied" | tee -a "${LOG_DIR}/03b-patch-input.log"
          fi

      - name: Apply tvOS render-throttle patch (WP6 / 0005 wiliwili)
        run: |
          set -euo pipefail
          # 0005 叠加在 0002/0003 之上，作用于 wiliwili 源码树 (config_helper.cpp)
          # tvOS 默认启用 60fps 兜底限帧 + 保留 vsync，修复模拟器主循环空转 CPU 100%
          P5="${GITHUB_WORKSPACE}/patches/0005-wiliwili-render-throttle.patch"
          test -f "${P5}" || { echo "patch not found: ${P5}"; exit 1; }
          if git -C "${SRC_DIR}" apply --reverse --check "${P5}" >/dev/null 2>&1; then
            echo "0005 already applied" | tee "${LOG_DIR}/03c-patch-throttle.log"
          else
            git -C "${SRC_DIR}" apply --check "${P5}" 2>&1 | tee "${LOG_DIR}/03c-patch-throttle.log"
            git -C "${SRC_DIR}" apply "${P5}"
            echo "0005 applied" | tee -a "${LOG_DIR}/03c-patch-throttle.log"
          fi

      - name: Apply tvOS resilience + top-exit patches (WP8 0007 wiliwili, WP10 0006 borealis)
        run: |
          set -euo pipefail
          # 0007 叠加在 0002/0003/0005 之上，作用于 wiliwili 源码树
          #   Bug B: config 原子写(temp+rename) + 崩溃 marker 自愈(重置设置保登录) — TVOS 宏隔离
          P7="${GITHUB_WORKSPACE}/patches/0007-wiliwili-tvos-resilience.patch"
          test -f "${P7}" || { echo "patch not found: ${P7}"; exit 1; }
          if git -C "${SRC_DIR}" apply --reverse --check "${P7}" >/dev/null 2>&1; then
            echo "0007 already applied" | tee "${LOG_DIR}/03d-patch-resilience.log"
          else
            git -C "${SRC_DIR}" apply --check "${P7}" 2>&1 | tee "${LOG_DIR}/03d-patch-resilience.log"
            git -C "${SRC_DIR}" apply "${P7}"
            echo "0007 applied" | tee -a "${LOG_DIR}/03d-patch-resilience.log"
          fi
          # 0006 叠加在 0004 之上，作用于 borealis 子模块 (applet_frame.cpp + application.cpp)
          #   WP10: 手柄顶层按 B -> AppletFrame::popContentView 原会弹"退出wiliwili?"对话框 ->
          #   确认调 Application::quit() -> 优雅 teardown 拆 SDL/GL 上下文 = 卡死白屏。修复: 顶层
          #   退出在 tvOS 直接 std::exit(0)(不弹框、进程立即结束回主屏) + Application::quit() 在
          #   tvOS 短路 no-op(杜绝其余优雅 quit 路径的白屏)。TVOS 宏隔离, 不影响 Switch/PS4/iOS。
          P6="${GITHUB_WORKSPACE}/patches/0006-borealis-tvos-exit-menu.patch"
          test -f "${P6}" || { echo "patch not found: ${P6}"; exit 1; }
          if git -C "${SRC_DIR}/library/borealis" apply --reverse --check "${P6}" >/dev/null 2>&1; then
            echo "0006 already applied" | tee -a "${LOG_DIR}/03d-patch-resilience.log"
          else
            git -C "${SRC_DIR}/library/borealis" apply --check "${P6}" 2>&1 | tee -a "${LOG_DIR}/03d-patch-resilience.log"
            git -C "${SRC_DIR}/library/borealis" apply "${P6}"
            echo "0006 applied" | tee -a "${LOG_DIR}/03d-patch-resilience.log"
          fi

      - name: Apply tvOS Siri Remote patch (WP12 / 0010 borealis)
        run: |
          set -euo pipefail
          # 0010 叠加在 0004/0006 之上，作用于 borealis 子模块 (sdl_input.cpp)。
          #   WP12: Siri Remote 最小方向导航 (上下左右 + 确定 + 返回)。已查证 SDL2
          #   src/joystick/apple/SDL_mfijoystick.m —— Siri Remote 触摸板方向在 SDL 里呈现为
          #   模拟轴 (Direction Pad X/Y Axis)，且可能未被建成可用 GameController (SDL_IsGameController
          #   ==false = 方向失效根因)。补丁在既有 GameController 路径之外新增 raw SDL_Joystick 兜底:
          #   边沿触发的离散 NAV 脉冲 (越阈值触发一次、带迟滞回中前不重复，避免焦点连跳) + hat 兜底
          #   + 中心点按->A / Menu->B 补映射 + 设备枚举/首个非零输入诊断日志。全程 TVOS 宏隔离,
          #   手柄走既有 GameController 路径零改动 (SDL_IsGameController==true 永不进入兜底)。
          P10="${GITHUB_WORKSPACE}/patches/0010-borealis-tvos-siri-remote.patch"
          test -f "${P10}" || { echo "patch not found: ${P10}"; exit 1; }
          if git -C "${SRC_DIR}/library/borealis" apply --reverse --check "${P10}" >/dev/null 2>&1; then
            echo "0010 already applied" | tee "${LOG_DIR}/03f-patch-siri-remote.log"
          else
            git -C "${SRC_DIR}/library/borealis" apply --check "${P10}" 2>&1 | tee "${LOG_DIR}/03f-patch-siri-remote.log"
            git -C "${SRC_DIR}/library/borealis" apply "${P10}"
            echo "0010 applied" | tee -a "${LOG_DIR}/03f-patch-siri-remote.log"
          fi

      - name: Apply tvOS quitApp cleanup patch (WP10 / 0009 wiliwili)
        run: |
          set -euo pipefail
          # 0009 叠加在 0002/0003/0005/0007 之上，作用于 wiliwili 源码树 (dialog_helper.cpp)。
          #   设置项变更调 DialogHelper::quitApp 在 tvOS 整体 no-op(仅 toast 提示下次启动生效)，
          #   消除 0002 之后残留的"点了没反应"死对话框。TVOS 宏隔离。
          #   (WP10 的 borealis 顶层退出根因修复见上一步的 0006 -> applet_frame std::exit(0)。)
          P9="${GITHUB_WORKSPACE}/patches/0009-wiliwili-tvos-quitapp-noop.patch"
          test -f "${P9}" || { echo "patch not found: ${P9}"; exit 1; }
          if git -C "${SRC_DIR}" apply --reverse --check "${P9}" >/dev/null 2>&1; then
            echo "0009 already applied" | tee "${LOG_DIR}/03e-patch-quitapp.log"
          else
            git -C "${SRC_DIR}" apply --check "${P9}" 2>&1 | tee "${LOG_DIR}/03e-patch-quitapp.log"
            git -C "${SRC_DIR}" apply "${P9}"
            echo "0009 applied" | tee -a "${LOG_DIR}/03e-patch-quitapp.log"
          fi

      - name: Build libromfs-generator (host tool, required by USE_LIBROMFS)
        run: |
          set -euo pipefail
          cd "${SRC_DIR}/library/borealis"
          bash ./build_libromfs_generator.sh 2>&1 | tee "${LOG_DIR}/02b-libromfs.log"

      # -------------------------------------------------------------------
      - name: Fetch MPVKit & assemble deps (tvOS slice)
        run: |
          set -euo pipefail
          BASE="https://github.com/mpvkit/MPVKit/releases/download/${MPVKIT_TAG}"
          FWS=(Libmpv Libavcodec Libavdevice Libavformat Libavfilter Libavutil Libswresample Libswscale)

          # 切片选择器：按 TARGET 选 MPVKit xcframework 内的 tvOS 切片。
          #   simulator：SupportedPlatform==tvos 且 SupportedPlatformVariant==simulator
          #             （即 tvos-arm64-simulator / tvos-arm64_x86_64-simulator）
          #   device   ：SupportedPlatform==tvos 且【无】SupportedPlatformVariant 键
          #             （即 tvos-arm64 真机切片）
          # 不硬编码 slice 目录名——运行时读 Info.plist 动态发现（见 docs/WP4 §2.2）。
          # 保留原 sim_slice_of 名以最小化改动，内部按 TARGET 分派。
          sim_slice_of() {
            local plist="$1/Info.plist" n i plat variant has_variant
            test -f "${plist}" || return 1
            n="$(plutil -extract AvailableLibraries raw "${plist}" 2>/dev/null || echo 0)"
            for ((i=0; i<n; i++)); do
              plat="$(plutil -extract AvailableLibraries.${i}.SupportedPlatform raw "${plist}" 2>/dev/null || true)"
              [ "${plat}" = "tvos" ] || continue
              # SupportedPlatformVariant 键存在性：extract 成功=有(模拟器/mac catalyst)，失败=无(真机)
              if plutil -extract AvailableLibraries.${i}.SupportedPlatformVariant raw "${plist}" >/dev/null 2>&1; then
                variant="$(plutil -extract AvailableLibraries.${i}.SupportedPlatformVariant raw "${plist}" 2>/dev/null || true)"
                has_variant=1
              else
                variant=""; has_variant=0
              fi
              if [ "${TARGET}" = "device" ]; then
                # 真机：tvos 且无 variant 键
                if [ "${has_variant}" = "0" ]; then
                  plutil -extract AvailableLibraries.${i}.LibraryIdentifier raw "${plist}"; return 0
                fi
              else
                # 模拟器（默认）：tvos 且 variant==simulator
                if [ "${variant}" = "simulator" ]; then
                  plutil -extract AvailableLibraries.${i}.LibraryIdentifier raw "${plist}"; return 0
                fi
              fi
            done
            return 1
          }

          for fw in "${FWS[@]}"; do
            zip="${MPVKIT_DIR}/${fw}.xcframework.zip"
            echo "downloading ${fw} ..." | tee -a "${LOG_DIR}/04-mpvkit.log"
            curl -fSL --retry 3 --retry-delay 3 -o "${zip}" "${BASE}/${fw}.xcframework.zip" \
              2>&1 | tee -a "${LOG_DIR}/04-mpvkit.log"
            rm -rf "${MPVKIT_DIR}/${fw}.xcframework"
            unzip -q -o "${zip}" -d "${MPVKIT_DIR}"
            xcf="${MPVKIT_DIR}/${fw}.xcframework"
            slice="$(sim_slice_of "${xcf}")" || {
              echo "ERROR: ${fw} has no tvOS-${TARGET} slice (tag=${MPVKIT_TAG}). See docs/WP4-mpvkit-integration.md §5 / docs/WP7-device-build.md." \
                | tee -a "${LOG_DIR}/04-mpvkit.log"; exit 1; }
            echo "${fw}: ${TARGET} slice = ${slice}" | tee -a "${LOG_DIR}/04-mpvkit.log"
            sdir="${xcf}/${slice}"
            a="$(find "${sdir}" -maxdepth 3 -name '*.a' | head -n1 || true)"
            if [ -z "${a}" ]; then
              a="$(find "${sdir}" -maxdepth 3 -type f \( -name "${fw#Lib}" -o -name "${fw}" \) | head -n1 || true)"
            fi
            test -n "${a}" || { echo "ERROR: no static lib in ${fw} slice"; exit 1; }
            lower="$(echo "${fw}" | tr '[:upper:]' '[:lower:]')"
            cp "${a}" "${DEPS_DIR}/lib/${lower}.a"
            # 只拷 Libmpv 的头（编译期仅需 <mpv/*.h>）；FFmpeg 各库的平铺头
            # 含 time.h 等会遮蔽系统头（曾致 libc++ 'incomplete type tm' 全面编译失败），一律不拷
            if [ "${fw}" = "Libmpv" ]; then
              hdr="$(find "${sdir}" -maxdepth 3 -type d -name Headers | head -n1 || true)"
              if [ -n "${hdr}" ]; then
                if [ -d "${hdr}/mpv" ]; then
                  cp -R "${hdr}/." "${DEPS_DIR}/include/"
                else
                  mkdir -p "${DEPS_DIR}/include/mpv"
                  cp -R "${hdr}/." "${DEPS_DIR}/include/mpv/"
                fi
              fi
            fi
          done

          # 第三方传递依赖：run#10 证实 libmpv.a 未合并 libass/libplacebo 等
          # （run#8 摘要头尾截断曾误判只缺 gmp/xml2）。完整清单+URL 实抓自
          # 0.41.0 Package.swift 非 GPL binaryTargets（AUTO_GENERATE 段）。
          THIRD_PARTY=(
            "openssl-build/releases/download/3.3.5/Libcrypto"
            "openssl-build/releases/download/3.3.5/Libssl"
            "gnutls-build/releases/download/3.8.11/gmp"
            "gnutls-build/releases/download/3.8.11/nettle"
            "gnutls-build/releases/download/3.8.11/hogweed"
            "gnutls-build/releases/download/3.8.11/gnutls"
            "libass-build/releases/download/0.17.4/Libunibreak"
            "libass-build/releases/download/0.17.4/Libfreetype"
            "libass-build/releases/download/0.17.4/Libfribidi"
            "libass-build/releases/download/0.17.4/Libharfbuzz"
            "libass-build/releases/download/0.17.4/Libass"
            "libsmbclient-build/releases/download/4.15.13-2512/Libsmbclient"
            "libbluray-build/releases/download/1.4.0/Libbluray"
            "libuavs3d-build/releases/download/1.2.1-xcode/Libuavs3d"
            "libdovi-build/releases/download/3.3.2/Libdovi"
            "moltenvk-build/releases/download/1.4.1/MoltenVK"
            "libshaderc-build/releases/download/2025.5.0/Libshaderc_combined"
            "lcms2-build/releases/download/2.17.0/lcms2"
            "libplacebo-build/releases/download/7.351.0-2512/Libplacebo"
            "libdav1d-build/releases/download/1.5.2-xcode/Libdav1d"
            "libuchardet-build/releases/download/0.0.8-xcode/Libuchardet"
            "libluajit-build/releases/download/2.1.0-xcode/Libluajit"
          )
          TP_LIBS=""
          for entry in "${THIRD_PARTY[@]}"; do
            name="${entry##*/}"
            url="https://github.com/mpvkit/${entry}.xcframework.zip"
            zip="${MPVKIT_DIR}/${name}.xcframework.zip"
            echo "downloading ${name} ..." | tee -a "${LOG_DIR}/04-mpvkit.log"
            curl -fSL --retry 3 --retry-delay 3 -o "${zip}" "${url}" 2>&1 | tee -a "${LOG_DIR}/04-mpvkit.log"
            rm -rf "${MPVKIT_DIR}/${name}.xcframework"
            unzip -q -o "${zip}" -d "${MPVKIT_DIR}"
            xcf="$(find "${MPVKIT_DIR}" -maxdepth 1 -iname "${name}.xcframework" | head -n1)"
            slice="$(sim_slice_of "${xcf}")" || {
              echo "WARN: ${name} has no tvOS-${TARGET} slice, skipping" | tee -a "${LOG_DIR}/04-mpvkit.log"; continue; }
            base="${name#Lib}"
            # 布局兼容：静态库布局（*.a）或 framework 布局（无扩展名二进制，如 gmp.framework/gmp，run#9 教训）
            a="$(find "${xcf}/${slice}" -maxdepth 4 -name '*.a' | head -n1 || true)"
            if [ -z "${a}" ]; then
              a="$(find "${xcf}/${slice}" -maxdepth 4 -type f \( -name "${base}" -o -name "${name}" \) | head -n1 || true)"
            fi
            if [ -z "${a}" ]; then
              echo "WARN: no static lib in ${name} slice, skipping" | tee -a "${LOG_DIR}/04-mpvkit.log"
              find "${xcf}/${slice}" -maxdepth 4 | head -n 20 | tee -a "${LOG_DIR}/04-mpvkit.log"; continue
            fi
            cp "${a}" "${DEPS_DIR}/lib/lib${base}.a"
            TP_LIBS="${TP_LIBS} -l${base}"
            echo "${name}: -> lib${base}.a (slice ${slice})" | tee -a "${LOG_DIR}/04-mpvkit.log"
          done
          echo "TP_LIBS=${TP_LIBS}" | tee -a "${LOG_DIR}/04-mpvkit.log"
          echo "TP_LIBS=${TP_LIBS}" >> "${GITHUB_ENV}"

          # 用 sed 去掉 YAML 块缩进，避免把前导空格写进 .pc（strict pkg-config 会报错）
          sed 's/^          //' > "${DEPS_DIR}/lib/pkgconfig/mpv.pc" <<EOF
          prefix=${DEPS_DIR}
          libdir=\${prefix}/lib
          includedir=\${prefix}/include
          Name: mpv
          Version: ${MPVKIT_TAG}
          Description: mpv media player (tvOS ${TARGET}, from MPVKit)
          Libs: -L\${libdir} -lmpv
          Libs.private: -lavcodec -lavformat -lavutil -lavfilter -lavdevice -lswresample -lswscale${TP_LIBS} -lxml2 -lbz2 -lexpat -lresolv -lc++ -framework AVFoundation -framework CoreAudio -framework AudioToolbox -framework CoreVideo -framework CoreMedia -framework VideoToolbox -framework Metal -framework IOSurface -framework QuartzCore -framework CoreGraphics -framework CoreText -framework CoreFoundation -lc++ -lz -liconv -lbz2 -lexpat -lresolv -lxml2
          Cflags: -I\${includedir}
          EOF
          echo "--- mpv.pc ---" | tee -a "${LOG_DIR}/04-mpvkit.log"
          cat "${DEPS_DIR}/lib/pkgconfig/mpv.pc" | tee -a "${LOG_DIR}/04-mpvkit.log"
          echo "NOTE: libmpv transitively needs 3rd-party static libs (openssl/gnutls/libass/dav1d/placebo/MoltenVK...). If the link step reports undefined symbols, add those xcframeworks per docs/WP4-mpvkit-integration.md §1.2." \
            | tee -a "${LOG_DIR}/04-mpvkit.log"

      # -------------------------------------------------------------------
      - name: CMake configure (tvOS)
        run: |
          set -euo pipefail
          # target→PLATFORM 映射：simulator=SIMULATORARM64_TVOS（默认，行为不变），
          # device=TVOS（arm64-apple-tvos，appletvos SDK；ios.toolchain.cmake:369）。
          if [ "${TARGET}" = "device" ]; then
            PLATFORM_VAL="TVOS"
            BUILD_DIR="${SRC_DIR}/build-tvos-device"
          else
            PLATFORM_VAL="SIMULATORARM64_TVOS"
            BUILD_DIR="${SRC_DIR}/build-tvsim"
          fi
          echo "BUILD_DIR=${BUILD_DIR}" >> "${GITHUB_ENV}"
          echo "PLATFORM_VAL=${PLATFORM_VAL}" | tee "${LOG_DIR}/05-platform.log"
          export PKG_CONFIG_LIBDIR="${DEPS_DIR}/lib/pkgconfig"
          pkg-config --exists mpv || { echo "pkg-config cannot find mpv"; exit 1; }
          cmake -B "${BUILD_DIR}" -S "${SRC_DIR}" -G Xcode \
            -DPLATFORM_TVOS=ON \
            -DPLATFORM=${PLATFORM_VAL} \
            -DLIBROMFS_PREBUILT_GENERATOR="${SRC_DIR}/library/borealis/libromfs-generator" \
            -DHAVE_H_ERRNO_ASSIGNABLE_EXITCODE=0 \
            -DHAVE_H_ERRNO_ASSIGNABLE_EXITCODE__TRYRUN_OUTPUT="" \
            -DHAVE_POLL_FINE_EXITCODE=1 \
            -DHAVE_POLL_FINE_EXITCODE__TRYRUN_OUTPUT="" \
            -DCURL_USE_LIBPSL=OFF \
            -DCURL_USE_LIBSSH2=OFF \
            -DCMAKE_EXE_LINKER_FLAGS="-L${DEPS_DIR}/lib ${TP_LIBS} -lxml2 -lbz2 -lexpat -lresolv -liconv -lz -framework AVFoundation -framework CoreMedia -framework CoreVideo -framework VideoToolbox -framework AudioToolbox -framework CoreAudio -framework Metal -framework MetalKit -framework QuartzCore -framework IOSurface -framework CoreImage -framework CoreText -framework CoreGraphics -framework Security -framework Network -framework SystemConfiguration" \
            -DDEPLOYMENT_TARGET="${DEPLOYMENT_TARGET}" \
            -DCMAKE_BUILD_TYPE="${BUILD_CONFIG}" \
            2>&1 | tee "${LOG_DIR}/05-cmake-configure.log"

      - name: CMake build (no code signing)
        run: |
          set -euo pipefail
          cmake --build "${BUILD_DIR}" --config "${BUILD_CONFIG}" -- \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            2>&1 | tee "${LOG_DIR}/06-cmake-build.log"

      - name: Locate .app
        id: locate
        run: |
          set -euo pipefail
          APP="$(find "${BUILD_DIR}" -maxdepth 5 -type d -name 'wiliwili.app' | head -n1 || true)"
          test -n "${APP}" || { echo "wiliwili.app not found"; exit 1; }
          echo "app_path=${APP}" >> "${GITHUB_OUTPUT}"
          echo "found: ${APP}" | tee "${LOG_DIR}/07-locate.log"

      # -------------------------------------------------------------------
      # WP9：用 actool 编译 brandassets → Assets.car + partial Info.plist，
      # 拷进 .app 并把图标键（CFBundleIcons 等）合并进 .app/Info.plist。
      #   --platform 按 TARGET：device=appletvos，simulator=appletvsimulator。
      # 全程非致命：actool / 合并任何失败仅 WARN 并 exit 0，绝不阻塞主线
      # （无图标也能出可用 .app；tvOSBundleInfo.plist.in 里 CFBundleIcons 注释占位不动，
      #   由本步骤的 partial plist 合并接管）。
      - name: Compile brand assets (actool) & merge into .app [non-fatal]
        if: always()
        run: |
          set +e
          APP="${{ steps.locate.outputs.app_path }}"
          XC="${GITHUB_WORKSPACE}/assets/generated/Assets.xcassets"
          LOG="${LOG_DIR}/11-actool.log"
          : > "${LOG}"
          if [ -z "${APP}" ] || [ ! -d "${APP}" ]; then
            echo "WARN: .app not located; skip actool (non-fatal)" | tee -a "${LOG}"; exit 0
          fi
          if [ ! -d "${XC}" ]; then
            echo "WARN: ${XC} missing (generation skipped/failed); build keeps default icon" \
              | tee -a "${LOG}"; exit 0
          fi
          if [ "${TARGET}" = "device" ]; then ACPLAT="appletvos"; else ACPLAT="appletvsimulator"; fi
          OUTDIR="$(mktemp -d)"
          PARTIAL="${OUTDIR}/actool-partial.plist"
          echo "actool platform=${ACPLAT} xcassets=${XC}" | tee -a "${LOG}"
          xcrun actool "${XC}" \
            --compile "${OUTDIR}" \
            --platform "${ACPLAT}" \
            --minimum-deployment-target "${DEPLOYMENT_TARGET}" \
            --target-device tv \
            --app-icon "App Icon & Top Shelf Image" \
            --output-partial-info-plist "${PARTIAL}" \
            --errors --warnings --notices 2>&1 | tee -a "${LOG}"
          rc=${PIPESTATUS[0]}
          if [ "${rc}" != "0" ]; then
            echo "WARN: actool failed (rc=${rc}); continuing without icon (non-fatal)" \
              | tee -a "${LOG}"; exit 0
          fi
          CAR="${OUTDIR}/Assets.car"
          if [ -f "${CAR}" ]; then
            cp "${CAR}" "${APP}/Assets.car"
            echo "copied Assets.car -> ${APP}/Assets.car" | tee -a "${LOG}"
          else
            echo "WARN: no Assets.car produced (non-fatal)" | tee -a "${LOG}"
          fi
          if [ -f "${PARTIAL}" ]; then
            echo "--- actool partial Info.plist ---" | tee -a "${LOG}"
            cat "${PARTIAL}" | tee -a "${LOG}"
            if /usr/libexec/PlistBuddy -c "Merge ${PARTIAL}" "${APP}/Info.plist" 2>&1 | tee -a "${LOG}"; then
              echo "merged partial Info.plist keys (CFBundleIcons etc.) into .app/Info.plist" \
                | tee -a "${LOG}"
            else
              echo "WARN: PlistBuddy merge failed (non-fatal)" | tee -a "${LOG}"
            fi
          else
            echo "WARN: no partial Info.plist produced (non-fatal)" | tee -a "${LOG}"
          fi
          exit 0

      # -------------------------------------------------------------------
      # device 目标产物无法在 runner 上 boot，跳过冒烟（target != 'device'）。
      # push 触发时 inputs.target 为空 != 'device'，条件仍成立，行为不变。
      - name: Simulator smoke test
        if: ${{ github.event.inputs.target != 'device' && github.event.inputs.run_smoke != '0' }}
        run: |
          set -euo pipefail
          APP="${{ steps.locate.outputs.app_path }}"

          DEVTYPE="com.apple.CoreSimulator.SimDeviceType.Apple-TV-4K-3rd-generation-4K"
          if ! xcrun simctl list devicetypes | grep -q "${DEVTYPE}"; then
            DEVTYPE="$(xcrun simctl list devicetypes | grep -i 'Apple TV' \
              | grep -oE 'com\.apple\.CoreSimulator\.SimDeviceType\.[A-Za-z0-9._-]+' | head -n1)"
          fi
          test -n "${DEVTYPE}" || { echo "no Apple TV device type"; exit 1; }
          RUNTIME="$(xcrun simctl list runtimes | grep -i 'tvOS' \
            | grep -oE 'com\.apple\.CoreSimulator\.SimRuntime\.tvOS[-0-9]+' | head -n1)"
          test -n "${RUNTIME}" || { echo "no tvOS runtime installed"; exit 1; }
          echo "devtype=${DEVTYPE} runtime=${RUNTIME}" | tee "${LOG_DIR}/08-simctl.log"

          UDID="$(xcrun simctl create wiliwili-tvos-smoke "${DEVTYPE}" "${RUNTIME}")"
          echo "udid=${UDID}" | tee -a "${LOG_DIR}/08-simctl.log"

          xcrun simctl boot "${UDID}" 2>&1 | tee -a "${LOG_DIR}/08-simctl.log" || true
          xcrun simctl bootstatus "${UDID}" -b 2>&1 | tee -a "${LOG_DIR}/08-simctl.log" || true

          xcrun simctl install "${UDID}" "${APP}" 2>&1 | tee -a "${LOG_DIR}/08-simctl.log"

          BUNDLE_ID="$(plutil -extract CFBundleIdentifier raw "${APP}/Info.plist")"
          echo "bundle_id=${BUNDLE_ID}" | tee -a "${LOG_DIR}/08-simctl.log"

          OUT="$(xcrun simctl launch "${UDID}" "${BUNDLE_ID}" 2>&1 | tee -a "${LOG_DIR}/08-simctl.log" || true)"
          echo "launch: ${OUT}"

          sleep 15
          xcrun simctl io "${UDID}" screenshot "${LOG_DIR}/smoke-screenshot.png" \
            2>&1 | tee -a "${LOG_DIR}/08-simctl.log" || true
          xcrun simctl spawn "${UDID}" log show --last 2m --predicate "process == 'wiliwili'" \
            > "${LOG_DIR}/09-app-syslog.log" 2>&1 || true

          ALIVE=0
          if xcrun simctl spawn "${UDID}" launchctl list 2>/dev/null | grep -q "${BUNDLE_ID}"; then ALIVE=1; fi
          if [ "${ALIVE}" != "1" ] && xcrun simctl spawn "${UDID}" ps -ax 2>/dev/null | grep -q "wiliwili.app/wiliwili"; then ALIVE=1; fi

          xcrun simctl shutdown "${UDID}" >/dev/null 2>&1 || true
          test "${ALIVE}" = "1" || { echo "SMOKE FAIL: process not alive"; exit 1; }
          echo "SMOKE PASS" | tee -a "${LOG_DIR}/08-simctl.log"

      # -------------------------------------------------------------------
      - name: Upload .app artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # device → wiliwili-tvos-device-app；simulator（含 push）→ wiliwili-tvos-simulator-app
          name: wiliwili-tvos-${{ github.event.inputs.target == 'device' && 'device' || 'simulator' }}-app
          path: ${{ steps.locate.outputs.app_path }}
          if-no-files-found: warn

      - name: Upload logs & screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wiliwili-tvos-logs
          path: ${{ env.LOG_DIR }}
          if-no-files-found: warn

      # 失败时把错误摘要提交回仓库（[skip ci] 防止触发新构建），
      # 使诊断可以通过公开 raw 内容完成，不依赖登录态浏览器。
      - name: Publish failure excerpt to repo
        if: failure()
        run: |
          set -uo pipefail
          EX="/tmp/failure-excerpt.txt"
          {
            echo "run=${GITHUB_RUN_NUMBER} sha=${GITHUB_SHA} date=$(date -u +%FT%TZ)"
            for f in "${LOG_DIR}"/*.log; do
              if grep -qE "error:|Undefined symbol|ld: error|fatal error|FAILED" "$f" 2>/dev/null; then
                echo "===== ${f##*/} (error context) ====="
                grep -nE -B2 -A8 "error:|Undefined symbol|ld: error|fatal error" "$f" | head -n 400
              fi
            done
            echo "===== tail 06-cmake-build.log ====="
            tail -n 150 "${LOG_DIR}/06-cmake-build.log" 2>/dev/null || true
            echo "===== tail 05-cmake-configure.log ====="
            tail -n 60 "${LOG_DIR}/05-cmake-configure.log" 2>/dev/null || true
          } > "$EX" || true
          cd "${GITHUB_WORKSPACE}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          mkdir -p ci-logs
          cp "$EX" ci-logs/last-failure.txt
          git add ci-logs/last-failure.txt
          git commit -m "ci: failure excerpt run ${GITHUB_RUN_NUMBER} [skip ci]" || true
          git push origin HEAD:main || true
